apiVersion: apps/v1
kind: Deployment

metadata:
  name: devops-demo

spec:
  replicas: 4

  selector:
    matchLabels:
      app: devops-demo

  template:

    metadata:
      labels:
        app: devops-demo

    spec:
      containers:

      - name: devops-demo

        image: ghcr.io/jay-2000/devops-gitops-project/devops-demo:latest

        ports:
        - containerPort: 3000
